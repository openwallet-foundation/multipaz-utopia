# Multipaz Server Bundle - nginx reverse proxy configuration
# Routes requests by path prefix to individual services

worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Upstream definitions for each service
    upstream registry {
        server 127.0.0.1:8004;
    }

    upstream bank_of_utopia {
        server 127.0.0.1:8001;
    }

    upstream dmv {
        server 127.0.0.1:8002;
    }

    upstream upay {
        server 127.0.0.1:8009;
    }

    upstream brewery {
        server 127.0.0.1:8010;
    }

    server {
        listen 8100;
        server_name _;

        # Increase buffer sizes for large JWT tokens
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Common proxy settings
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Records server (System of Record)
        location /registry/ {
            proxy_pass http://registry/;
        }
        location = /registry {
            return 302 /registry/;
        }

        # Payment server
        location /upay/ {
            proxy_pass http://upay/;
        }
        location = /upay {
            return 302 /upay/;
        }

        # Bank of Utopia
        location /bank_of_utopia/ {
            proxy_pass http://bank_of_utopia/;
        }
        location = /bank_of_utopia {
            return 302 /bank_of_utopia/;
        }
        location = /.well-known/oauth-authorization-server/bank_of_utopia {
            proxy_pass http://bank_of_utopia/.well-known/oauth-authorization-server;
        }
        location = /.well-known/openid-credential-issuer/bank_of_utopia {
            proxy_pass http://bank_of_utopia/.well-known/openid-credential-issuer;
        }



        # DMV
        location /dmv/ {
            proxy_pass http://dmv/;
        }
        location = /dmv {
            return 302 /dmv/;
        }
        location = /.well-known/oauth-authorization-server/dmv {
            proxy_pass http://dmv/.well-known/oauth-authorization-server;
        }
        location = /.well-known/openid-credential-issuer/dmv {
            proxy_pass http://dmv/.well-known/openid-credential-issuer;
        }


        # Brewery server
        location /brewery/ {
            proxy_pass http://brewery/;
        }
        location = /brewery {
            return 302 /brewery/;
        }

        # Root - serve the web frontend
        location / {
            root /app/web;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Health check endpoint
        location /health {
            default_type application/json;
            return 200 '{"status":"ok"}';
        }
    }
}
